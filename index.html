<!doctype html>
<html lang="en" style="background-color: #0A0A0A; color: #ffffff;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Faheem — UI/UX Designer & Frontend Developer</title>
    <meta name="description" content="Portfolio of Faheem — UI/UX Designer & Frontend Developer building high-performance web applications and digital experiences." />

    <!-- Strict Anti-Caching Meta Tags for Production Browsers -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Resource Preconnect Hints for Font Delivery -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Automatically unregister any legacy service workers on load -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
